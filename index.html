<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nonverbal Speech Recognition Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      line-height: 1.6;
      color: #1f2937;
    }

    h1 {
      text-align: center;
      color: #4f46e5;
    }

    h2 {
      text-align: center;
      color: #1e3a8a;
    }

    .section {
      margin-top: 60px;
    }

    /* CARD STYLE */
    .card {
      background: white;
      padding: 25px;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      max-width: 900px;
      transition: all 0.25s ease;
      border-left: 5px solid #6366f1;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    audio {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }

    /* FIX: 1 COLUMN */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e0e7ff;
      margin-right: 6px;
      font-size: 12px;
      color: #3730a3;
      font-weight: 500;
    }

    .pipeline-img {
      width: 100%;
      max-width: 800px;
      display: block;
      margin: auto;
    }

    /* TABLE STYLE */
    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    .result-table th {
      background: #e6f0ff;
      color: #1a3d7c;
      padding: 12px;
      font-weight: bold;
    }

    .result-table td {
      padding: 12px;
      border-top: 1px solid #eee;
    }

    .result-table tr:hover {
      background: #f9fbff;
    }

    h3 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>Nonverbal Speech Recognition</h1>

<div class="section">
  <h2>Audio Samples</h2>
  <div id="samples" class="grid"></div>
</div>

<script>
const data = [
  {
    file: "GhtFLxtbE0k_99.wav",
    text: "<uhm> không biết có sự hiểu lầm gì hay không",
    nonverbal: "<uhmuhm>",
    emotion: "neutral"
  },
  {
    file: "UUI5v6yepFQ_64.wav",
    text: "chị thì giỏi giang, chị nuôi con ăn học tới nơi tới chốn thì dễ, <sniffle> chứ tôi nghèo, con mừng nó phải nghỉ học từ hồi sớm lận, nó cực khổ trăm bề với tôi mà, với lại",
    nonverbal: "<sniffle>",
    emotion: "sad"
  },
  {
    file: "eSou7s6C2FY_2.wav",
    text: "anh đã không còn bận tâm nữa rồi từ nay anh sẽ không bao giờ giận em <laugh>",
    nonverbal: "<laugh>",
    emotion: "happy"
  }
];

const container = document.getElementById("samples");

data.forEach(item => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <audio controls src="${item.file}"></audio>
    <p><b>Text:</b> ${item.text}</p>
    <p>
      <span class="tag">Emotion: ${item.emotion}</span>
      <span class="tag">Nonverbal: ${item.nonverbal}</span>
    </p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
